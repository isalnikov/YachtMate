name: captain_wrongel
description: Captain Wrongel — offline-first yacht navigator (Flutter).
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  drift: ^2.29.0
  sqlite3_flutter_libs: ^0.5.34
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  maplibre_gl: ^0.25.0
  geolocator: ^13.0.4
  permission_handler: ^11.4.0
  http: ^1.4.0
  url_launcher: ^6.3.1
  encrypt: ^5.0.3
  crypto: ^3.0.3
  file_picker: ^8.1.7
  flutter_compass: ^0.8.1
  record: ^6.2.0
  just_audio: ^0.10.5
  speech_to_text: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.29.0
  build_runner: ^2.5.4
  sqlite3: ^2.9.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/map/demo_navigation_layers.geojson
    - assets/map/fethiye_navigation_layers.geojson
    - assets/mooring/demo_moorings_fethiye.geojson
    - assets/nmea/demo_feed.nmea
    - assets/tides/demo_tides.json
    - assets/reference/knots_demo.json
    - assets/coastal/shore_poi_demo.geojson
    - assets/reference/medical_glossary_demo.json
    - assets/training/colreg_quiz_demo.json
    - assets/training/vhf_scenarios_demo.json

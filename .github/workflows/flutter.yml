name: Flutter CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install SQLite (Linux FFI for tests)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0

      - run: flutter pub get

      - name: Verify Drift codegen is current
        run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter analyze

      - run: flutter test --coverage
